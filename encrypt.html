<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Halden Archive Encryptor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin: 0; background: #0a0d0f; color: #c9d6d2; font-family: "Courier New", monospace; padding: 24px; }
textarea, input { width: 100%; box-sizing: border-box; background: #050606; border: 1px solid #3b4a4f; color: white; padding: 10px; margin: 8px 0; }
button { padding: 10px; background: #162024; border: 1px solid #3b4a4f; color: white; cursor: pointer; }
h1, h2 { color: #8fb6a3; }
.note { color: #6f8380; }
</style>
</head>
<body>
<h1>Halden Archive Encryptor</h1>
<p class="note">Paste the HTML/text you want hidden, enter the password for that version, then copy the JSON output into the matching page's encrypted field in index.html.</p>

<h2>Content to Encrypt</h2>
<textarea id="plainText" rows="15" placeholder="Paste hidden page content here. HTML is okay."></textarea>

<h2>Password</h2>
<input id="password" type="password" placeholder="Password for this version">

<button onclick="encryptText()">Encrypt</button>

<h2>Encrypted Output</h2>
<textarea id="output" rows="12" readonly></textarea>

<script>
async function getKey(password, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    "PBKDF2",
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt,
      iterations: 250000,
      hash: "SHA-256"
    },
    keyMaterial,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt"]
  );
}

function arrayBufferToBase64(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

async function encryptText() {
  const text = document.getElementById("plainText").value;
  const password = document.getElementById("password").value;

  if (!text || !password) {
    alert("Add content and a password first.");
    return;
  }

  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await getKey(password, salt);

  const encrypted = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    enc.encode(text)
  );

  const payload = {
    salt: arrayBufferToBase64(salt),
    iv: arrayBufferToBase64(iv),
    data: arrayBufferToBase64(encrypted)
  };

  document.getElementById("output").value = JSON.stringify(payload, null, 2);
}
</script>
</body>
</html>
